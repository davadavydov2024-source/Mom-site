<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для мамы 💖</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: linear-gradient(180deg,#ff4fa3,#ff87c5,#ffd9ec);
  color: #fff;
}

/* контейнер страниц */
.pages {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  overscroll-behavior-x: none;
}

/* каждая страница */
.page {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
  position: relative;
}

/* запрет горизонтали */
.pages, .page {
  overflow-x: hidden;
}

/* фоновые сердечки */
.bg {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.15),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(255,255,255,.12),transparent 40%);
  z-index: 0;
}

/* текст */
.content {
  z-index: 2;
  max-width: 500px;
}

h1 {
  font-size: 42px;
  margin-bottom: 14px;
}

p {
  font-size: 20px;
  line-height: 1.6;
}

/* фото */
.photo img {
  width: 100%;
  max-width: 320px;
  border-radius: 26px;
  box-shadow: 0 20px 60px rgba(0,0,0,.35);
}

/* кнопки */
button {
  margin-top: 20px;
  padding: 14px 28px;
  border-radius: 999px;
  border: none;
  font-size: 18px;
  background: rgba(255,255,255,.9);
  color: #ff3b8d;
  cursor: pointer;
}

/* ночной режим */
body.night {
  background: linear-gradient(180deg,#1b1026,#3a1b4f,#2b133d);
}

/* летающие сердечки */
.heart {
  position: fixed;
  font-size: 20px;
  animation: float 6s linear forwards;
  pointer-events: none;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-20vh); opacity: 0; }
}

/* секретка */
#secret {
  display: none;
  background: linear-gradient(180deg,#111,#2b1340);
}

/* лабиринт */
#maze {
  width: 220px;
  height: 220px;
  background: #000;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(11,1fr);
}
.cell {
  border: 1px solid #333;
}
.wall { background:#333; }
.player { background:#ff4fa3; }
.exit { background:#6affb2; }

/* призрак */
#ghost {
  font-size: 80px;
  margin-top: 20px;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div class="pages" id="pages">

<!-- экран 1 -->
<section class="page">
  <div class="bg"></div>
  <div class="content">
    <h1>Это от Артёма и Андрея 💖</h1>
    <p>Нажми на экран</p>
  </div>
</section>

<!-- экран 2 -->
<section class="page">
  <div class="bg"></div>
  <div class="content photo">
    <img src="https://i.ibb.co/6JDxwj1v/IMG-0704.jpg">
  </div>
</section>

<!-- экран 3 -->
<section class="page">
  <div class="bg"></div>
  <div class="content photo">
    <img src="https://i.ibb.co/p69x2rzG/IMG-0705.jpg">
  </div>
</section>

<!-- экран 4 -->
<section class="page">
  <div class="bg"></div>
  <div class="content">
    <h1>Спасибо за заботу ❤️</h1>
    <button onclick="finalHearts()">Любим</button>
  </div>
</section>

<!-- СЕКРЕТНЫЙ -->
<section class="page" id="secret">
  <div class="content">
    <h1>Секрет 💖</h1>
    <p>Ты нашла пасхалку!</p>
    <button onclick="startQuest()">Мини-квест</button>

    <div id="maze"></div>

    <input id="name" placeholder="Твоё имя"><br>
    <input id="age" placeholder="Сколько тебе лет"><br>
    <button onclick="finishQuest()">Готово</button>

    <div id="ghost"></div>
    <p id="ghostText"></p>
  </div>
</section>

</div>

<script>
let clicks = 0;
let music = document.getElementById("music");

document.body.addEventListener("click",()=>{
  music.play();
  clicks++;
  if(clicks===15){
    document.getElementById("secret").style.display="flex";
    document.getElementById("pages").scrollTo({
      top: document.getElementById("pages").scrollHeight,
      behavior: "smooth"
    });
  }
});

/* сердечки */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},700);

/* финал */
function finalHearts(){
  for(let i=0;i<40;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize="28px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  }
}

/* мини игра */
function startQuest(){
  document.getElementById("maze").innerHTML="";
  for(let i=0;i<121;i++){
    let c=document.createElement("div");
    c.className="cell";
    document.getElementById("maze").appendChild(c);
  }
}

function finishQuest(){
  let name=document.getElementById("name").value;
  let ghost=document.getElementById("ghost");
  ghost.innerText="👻";
  document.getElementById("ghostText").innerText=
  `Молодец, ${name}! Ты прошла мою игру, я тебя не съем :)`;
}
</script>

</body>
</html>
