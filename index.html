<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Для мамы ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:linear-gradient(180deg,#ff5fa2,#ff9acb,#ffdff1);
overflow-x:hidden;
}

.dark{
background:linear-gradient(180deg,#12081f,#2c0f3e);
color:white;
}

/* страницы */

.pages{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.page{
height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

/* текст */

h1{
font-size:46px;
color:white;
text-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.box{
background:white;
padding:28px;
border-radius:26px;
max-width:420px;
font-size:19px;
line-height:1.6;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
margin-bottom:20px;
}

.dark .box{
background:#ffffff15;
backdrop-filter:blur(15px);
color:white;
}

/* цветы */

.flower{
position:fixed;
font-size:24px;
opacity:0.5;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* лабиринт */

.maze{
display:grid;
grid-template-columns:repeat(8,42px);
gap:6px;
margin-top:10px;
}

.cell{
width:42px;
height:42px;
border-radius:12px;
}

.wall{background:#f4a9c6}
.path{background:white}
.player{background:#ff4f9a}
.exit{background:#7dffba}

/* кнопки */

.controls{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,70px);
gap:12px;
}

.ctrl{
background:white;
padding:16px;
border-radius:22px;
font-size:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ввод */

input{
padding:10px;
border-radius:12px;
border:none;
margin:6px;
width:120px;
text-align:center;
}

/* призрак */

.ghost{
font-size:70px;
margin-top:20px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* сердца */

.heart{
position:fixed;
font-size:22px;
animation:boom 3s linear forwards;
}

@keyframes boom{
0%{transform:scale(0)}
40%{transform:scale(1.6)}
100%{transform:translateY(-800px) scale(0)}
}

/* ночь */

.night{
position:fixed;
bottom:20px;
left:20px;
background:#00000040;
color:white;
padding:10px 18px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="pages">

<div class="page">
<h1>Мамочка ❤️</h1>
</div>

<div class="page">
<div class="box">
С 8 Марта 🌸  
Спасибо тебе за любовь, заботу  
и за всё тепло которое ты даришь.  

Ты самая лучшая мама ❤️
</div>
</div>

<div class="page">
<div class="box">
Мы тебя очень любим  
и всегда будем рядом 💐
</div>
</div>

<div class="page">

<div class="box">
Мини-квест 👀  
Пройди лабиринт
</div>

<div id="maze" class="maze"></div>

<div class="controls">

<div></div>
<div class="ctrl" onclick="move(0,-1)">⬆️</div>
<div></div>

<div class="ctrl" onclick="move(-1,0)">⬅️</div>
<div class="ctrl" onclick="move(0,1)">⬇️</div>
<div class="ctrl" onclick="move(1,0)">➡️</div>

</div>

<div id="form" style="display:none" class="box">

Введите имя и возраст 👇

<br><br>

<input id="name" placeholder="Имя">

<input id="age" placeholder="Возраст">

<br>

<button onclick="finish()">Готово</button>

</div>

<div id="ghost" style="display:none" class="box">

<div class="ghost">👻</div>

<div id="ghostText"></div>

</div>

</div>

</div>

<div class="night" onclick="night()">🌙 Ночь</div>

<script>

/* цветы */

for(let i=0;i<18;i++){

let f=document.createElement("div")

f.className="flower"
f.innerHTML=["🌸","🌺","🌼","💐"][Math.floor(Math.random()*4)]

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=5+Math.random()*6+"s"

document.body.appendChild(f)

}

/* лабиринт */

const map=[
"########",
"#P     #",
"# ###  #",
"#   #  #",
"# #    #",
"#   ## #",
"#     E#",
"########"
]

let px=1
let py=1

const maze=document.getElementById("maze")

function draw(){

maze.innerHTML=""

map.forEach((row,y)=>{
[...row].forEach((c,x)=>{

let d=document.createElement("div")

d.className="cell "+(
x==px&&y==py?"player":
c=="#"?"wall":
c=="E"?"exit":"path"
)

maze.appendChild(d)

})
})

}

draw()

function move(dx,dy){

let nx=px+dx
let ny=py+dy

if(map[ny][nx]=="#")return

px=nx
py=ny

draw()

if(map[ny][nx]=="E"){
form.style.display="block"
}

}

/* финал */

function finish(){

let name=document.getElementById("name").value
let age=document.getElementById("age").value

ghost.style.display="block"

ghostText.innerHTML=
"Молодец "+name+" 🎉<br><br>"+
"Тебе "+age+" лет и ты прошла мою игру!<br><br>"+
"Я тебя не съем 👻"

hearts()

}

/* 200 сердечек */

function hearts(){

for(let i=0;i<200;i++){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.top=Math.random()*100+"vh"

document.body.appendChild(h)

setTimeout(()=>h.remove(),3000)

}

}

/* ночь */

function night(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
