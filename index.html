<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Для мамы 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  touch-action:manipulation;
}

body{
  background:linear-gradient(180deg,#ff5fa2,#ff9acb,#ffe3f1);
}

.pages{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.page{
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:28px;
  text-align:center;
  position:relative;
}

h1{
  color:#fff;
  font-size:40px;
  text-shadow:0 6px 20px rgba(0,0,0,.25);
}

.box{
  background:rgba(255,255,255,.95);
  padding:26px;
  border-radius:28px;
  max-width:420px;
  font-size:18px;
  line-height:1.7;
  color:#4a1f33;
  box-shadow:0 20px 50px rgba(0,0,0,.2);
}

.flower{
  position:absolute;
  font-size:34px;
  opacity:.35;
}

.secret-btn{
  position:fixed;
  bottom:18px;
  right:18px;
  background:#fff;
  color:#ff4f9a;
  padding:14px 18px;
  border-radius:20px;
  font-weight:600;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  z-index:20;
}

/* ===== СЕКРЕТКА ===== */
#secret{
  display:none;
  background:linear-gradient(180deg,#2b1638,#3a1f4f);
  color:#fff;
}

.maze{
  display:grid;
  grid-template-columns:repeat(10,30px);
  gap:6px;
  margin:18px 0;
}

.cell{
  width:30px;
  height:30px;
  border-radius:8px;
}

.wall{background:#f4a9c6}
.path{background:#fff}
.player{background:#ff4f9a}
.exit{background:#7dffb3}

.controls{
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:12px;
  margin-top:14px;
}

.ctrl{
  background:#fff;
  color:#333;
  border-radius:18px;
  padding:14px;
  font-size:22px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
}

input{
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  border:none;
  width:220px;
  font-size:16px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="pages" id="pages">

  <section class="page">
    <h1>Мамочка 💖</h1>
    <div class="flower" style="top:12%;left:10%">🌸</div>
    <div class="flower" style="bottom:12%;right:12%">💗</div>
  </section>

  <section class="page">
    <div class="box">
      Ты — самое тёплое и доброе сердце ❤️  
      Спасибо тебе за заботу, любовь и каждый день рядом.
    </div>
  </section>

  <section class="page">
    <div class="box">
      Мы тебя очень любим, ценим и гордимся тобой ✨  
      Пусть у тебя всегда будет радость и улыбка 🌷
    </div>
  </section>

</div>

<div class="secret-btn" id="openSecret">Секрет 💖</div>

<section class="page" id="secret">
  <div class="box" id="secretText">
    Мини-квест 👀  
    Пройди лабиринт
  </div>

  <div class="maze" id="maze"></div>

  <div class="controls">
    <div></div>
    <div class="ctrl" onclick="move(0,-1)">⬆️</div>
    <div></div>
    <div class="ctrl" onclick="move(-1,0)">⬅️</div>
    <div class="ctrl" onclick="move(0,1)">⬇️</div>
    <div class="ctrl" onclick="move(1,0)">➡️</div>
  </div>

  <div id="form" class="hidden">
    <input id="name" placeholder="Твоё имя">
    <input id="age" placeholder="Сколько тебе лет">
    <div class="ctrl" onclick="finish()">Готово 👻</div>
  </div>
</section>

<script>
let clicks=0;
document.body.addEventListener('click',()=>{
  clicks++;
  if(clicks===15){
    document.getElementById('openSecret').style.display='block';
  }
});

openSecret.onclick=()=>{
  pages.style.display='none';
  secret.style.display='flex';
};

/* ===== ЛАБИРИНТ ===== */
const map=[
"##########",
"#P   #   #",
"# ## # # #",
"#    # # #",
"####   # #",
"#    ### #",
"# ##     #",
"# ## ####E",
"#        #",
"##########"
];

let px=1,py=1;
const maze=document.getElementById('maze');

function draw(){
  maze.innerHTML='';
  map.forEach((row,y)=>{
    [...row].forEach((c,x)=>{
      const d=document.createElement('div');
      d.className='cell '+(
        x===px&&y===py?'player':
        c=='#'?'wall':
        c=='E'?'exit':'path'
      );
      maze.appendChild(d);
    });
  });
}
draw();

function move(dx,dy){
  const nx=px+dx, ny=py+dy;
  if(map[ny][nx]=='#')return;
  px=nx; py=ny;
  draw();
  if(map[ny][nx]=='E'){
    form.classList.remove('hidden');
    secretText.innerHTML='🎉 Ты прошла лабиринт!';
  }
}

function finish(){
  const n=name.value||'молодец';
  secretText.innerHTML=
  `👻 Молодец, ${n}!<br>
   Ты прошла мою игру.<br>
   Я тебя не съем 😢💖`;
  form.style.display='none';
}
</script>

</body>
</html>
