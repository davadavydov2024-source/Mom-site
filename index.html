<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Для мамы 💖</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  touch-action: manipulation;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: linear-gradient(180deg, #ff5fa2, #ff9acb, #ffe1ef);
  overflow-x: hidden;
}

.pages {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.page {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 28px;
  text-align: center;
  position: relative;
}

h1 {
  font-size: 40px;
  color: #fff;
  text-shadow: 0 6px 20px rgba(0,0,0,.25);
}

.text-box {
  background: rgba(255,255,255,0.92);
  padding: 26px;
  border-radius: 28px;
  max-width: 420px;
  font-size: 18px;
  line-height: 1.7;
  color: #4a1f33;
  box-shadow: 0 20px 50px rgba(0,0,0,.18);
}

.flower {
  position: absolute;
  font-size: 34px;
  opacity: .35;
}

.secret-btn {
  position: fixed;
  bottom: 18px;
  right: 18px;
  background: #fff;
  color: #ff4f9a;
  padding: 14px 18px;
  border-radius: 20px;
  font-weight: 600;
  display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.hidden {
  display: none;
}

/* ===== ЛАБИРИНТ ===== */
.maze {
  display: grid;
  grid-template-columns: repeat(10, 28px);
  gap: 6px;
  margin-bottom: 20px;
}

.cell {
  width: 28px;
  height: 28px;
  border-radius: 8px;
}

.wall { background: #f6b1cc; }
.path { background: #fff; }
.player { background: #ff4f9a; }
.exit { background: #7dffb3; }

.controls {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  margin-top: 14px;
}

.ctrl {
  background: #fff;
  border-radius: 18px;
  padding: 14px;
  font-size: 22px;
  box-shadow: 0 6px 20px rgba(0,0,0,.2);
}

input {
  margin-top: 10px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  width: 220px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="pages" id="pages">

  <!-- ЭКРАН 1 -->
  <section class="page">
    <h1>Мамочка 💖</h1>
    <div class="flower" style="top:10%;left:10%">🌸</div>
    <div class="flower" style="bottom:12%;right:12%">💗</div>
  </section>

  <!-- ЭКРАН 2 -->
  <section class="page">
    <div class="text-box">
      Ты — самое доброе, тёплое и любимое сердце ❤️  
      Спасибо тебе за заботу, ласку и каждый день рядом.
    </div>
  </section>

  <!-- ЭКРАН 3 -->
  <section class="page">
    <div class="text-box">
      Мы тебя очень любим, ценим и гордимся тобой ✨  
      Пусть у тебя всегда будет улыбка и счастье 🌷
    </div>
  </section>

</div>

<div class="secret-btn" id="openSecret">Секрет 💖</div>

<!-- СЕКРЕТКА -->
<div class="page hidden" id="secret">
  <div class="text-box" id="secretText">
    Пройди мини-квест 👀
  </div>

  <div class="maze" id="maze"></div>

  <div class="controls">
    <div></div>
    <div class="ctrl" onclick="move(0,-1)">⬆️</div>
    <div></div>
    <div class="ctrl" onclick="move(-1,0)">⬅️</div>
    <div class="ctrl" onclick="move(0,1)">⬇️</div>
    <div class="ctrl" onclick="move(1,0)">➡️</div>
  </div>

  <div id="form" class="hidden">
    <input id="name" placeholder="Твоё имя">
    <input id="age" placeholder="Сколько тебе лет">
    <div class="ctrl" onclick="finish()">Готово 👻</div>
  </div>
</div>

<script>
let clicks = 0;
document.body.addEventListener('click', () => {
  clicks++;
  if (clicks === 15) document.getElementById('openSecret').style.display = 'block';
});

document.getElementById('openSecret').onclick = () => {
  document.getElementById('pages').style.display = 'none';
  document.getElementById('secret').classList.remove('hidden');
};

const map = [
"##########",
"#P   #   #",
"# ## # # #",
"#    # # #",
"####   # #",
"#    ### #",
"# ##     #",
"# ## ####E",
"#        #",
"##########"
];

let px=1, py=1;
const mazeEl = document.getElementById('maze');

function draw(){
  mazeEl.innerHTML='';
  map.forEach((row,y)=>{
    [...row].forEach((c,x)=>{
      const d=document.createElement('div');
      d.className='cell '+(
        x===px&&y===py?'player':
        c=='#'?'wall':
        c=='E'?'exit':'path'
      );
      mazeEl.appendChild(d);
    });
  });
}
draw();

function move(dx,dy){
  const nx=px+dx, ny=py+dy;
  const cell=map[ny][nx];
  if(cell=='#') return;
  px=nx; py=ny;
  draw();
  if(cell=='E'){
    document.getElementById('form').classList.remove('hidden');
    document.getElementById('secretText').innerText='Ты прошла лабиринт 🎉';
  }
}

function finish(){
  const n=name.value, a=age.value;
  document.getElementById('secretText').innerHTML=
  `👻 Молодец, ${n}!<br>Ты прошла мою игру.<br>Я тебя не съем 😢💖`;
  document.getElementById('form').style.display='none';
}
</script>

</body>
</html>
