<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Для мамы ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:linear-gradient(180deg,#ff5fa2,#ff9acb,#ffdff1);
overflow-x:hidden;
transition:0.5s;
}

.dark{
background:linear-gradient(180deg,#140a22,#2a0f3f);
color:white;
}

/* страницы */

.pages{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.page{
height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
text-align:center;
}

/* заголовок */

h1{
font-size:44px;
color:white;
text-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fade 1s;
}

/* карточка */

.box{
background:white;
padding:28px;
border-radius:26px;
max-width:420px;
font-size:19px;
line-height:1.7;
box-shadow:0 30px 60px rgba(0,0,0,0.25);
animation:fade 1s;
}

.dark .box{
background:#ffffff18;
backdrop-filter:blur(20px);
color:white;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* кнопка */

.btn{
margin-top:20px;
padding:12px 22px;
border-radius:20px;
background:white;
font-weight:bold;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* ночной режим */

.night{
position:fixed;
bottom:20px;
left:20px;
background:#00000040;
color:white;
padding:10px 16px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* цветы */

.flower{
position:fixed;
font-size:22px;
opacity:0.4;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* лабиринт */

.maze{
display:grid;
grid-template-columns:repeat(8,40px);
gap:6px;
margin-top:20px;
}

.cell{
width:40px;
height:40px;
border-radius:12px;
}

.wall{background:#f4a9c6}
.path{background:white}
.player{background:#ff4f9a}
.exit{background:#6bffb0}

/* управление */

.controls{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,70px);
gap:12px;
}

.ctrl{
background:white;
padding:16px;
border-radius:22px;
font-size:22px;
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* сердца */

.heart{
position:fixed;
font-size:22px;
animation:boom 3s linear forwards;
}

@keyframes boom{
0%{transform:scale(0)}
40%{transform:scale(1.5)}
100%{transform:translateY(-700px) scale(0)}
}

</style>
</head>

<body>

<div class="pages">

<div class="page">
<h1>Мамочка 💖</h1>
</div>

<div class="page">
<div class="box">
С 8 Марта 🌸  
Спасибо тебе за любовь, заботу  
и за всё тепло которое ты даришь.  
Ты самая лучшая мама ❤️
</div>
</div>

<div class="page">
<div class="box">
Пусть у тебя всегда будет  
радость, здоровье и счастье ✨  

Мы тебя очень любим 💐
</div>
</div>

<div class="page">

<div class="box">
Мини-квест 👀  
Пройди лабиринт
</div>

<div class="maze" id="maze"></div>

<div class="controls">

<div></div>
<div class="ctrl" onclick="move(0,-1)">⬆️</div>
<div></div>

<div class="ctrl" onclick="move(-1,0)">⬅️</div>
<div class="ctrl" onclick="move(0,1)">⬇️</div>
<div class="ctrl" onclick="move(1,0)">➡️</div>

</div>

<div id="win" style="display:none;margin-top:20px;" class="box">
🎉 Ты прошла лабиринт!  
Мы тебя очень любим 💖
</div>

</div>

</div>

<div class="night" onclick="night()">🌙 Ночь</div>

<script>

/* цветы */

function flowers(){

for(let i=0;i<15;i++){

let f=document.createElement("div")

f.className="flower"
f.innerHTML=["🌸","🌺","💐","🌼"][Math.floor(Math.random()*4)]

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=5+Math.random()*6+"s"

document.body.appendChild(f)

}

}

flowers()

/* лабиринт */

const map=[
"########",
"#P     #",
"# ###  #",
"#   #  #",
"# #    #",
"#   ## #",
"#     E#",
"########"
]

let px=1
let py=1

const maze=document.getElementById("maze")

function draw(){

maze.innerHTML=""

map.forEach((row,y)=>{
[...row].forEach((c,x)=>{

const d=document.createElement("div")

d.className="cell "+(
x===px && y===py ? "player" :
c=="#" ? "wall" :
c=="E" ? "exit" :
"path"
)

maze.appendChild(d)

})
})

}

draw()

function move(dx,dy){

const nx=px+dx
const ny=py+dy

if(map[ny][nx]=="#")return

px=nx
py=ny

draw()

if(map[ny][nx]=="E"){
win.style.display="block"
superHearts()
}

}

/* 200 сердечек */

function superHearts(){

for(let i=0;i<200;i++){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.top=Math.random()*100+"vh"

document.body.appendChild(h)

setTimeout(()=>h.remove(),3000)

}

}

/* ночь */

function night(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
