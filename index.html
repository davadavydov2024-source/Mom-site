<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Маме ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:linear-gradient(180deg,#ff8ac6,#ffd6ec);
overflow-x:hidden;

}

/* СТРАНИЦЫ */

.pages{
height:100vh;
overflow-y:auto;
scroll-snap-type:y mandatory;
scroll-behavior:smooth;
}

.page{
min-height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
text-align:center;
}

/* GLASS КАРТОЧКА */

.card{

background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
border-radius:30px;
padding:30px;
max-width:420px;
font-size:20px;
line-height:1.6;

box-shadow:
0 25px 60px rgba(0,0,0,0.25),
0 0 30px rgba(255,120,180,0.5);

}

/* ЗАГОЛОВОК */

h1{

font-size:52px;
color:white;
text-shadow:0 10px 40px rgba(0,0,0,0.3);

}

/* ФОТО */

.photo{

width:260px;
border-radius:25px;
margin:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);

}

/* ЛАБИРИНТ */

.maze{
display:grid;
grid-template-columns:repeat(7,46px);
gap:8px;
margin-top:20px;
}

.cell{
width:46px;
height:46px;
border-radius:14px;
}

.wall{background:#f3a1c4}
.path{background:white}
.player{background:#ff3f92}
.exit{background:#7dffb5}

/* КНОПКИ */

.controls{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
}

.ctrl{
background:white;
border-radius:18px;
padding:18px;
font-size:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* ПОЛЯ */

input{
padding:12px;
border-radius:14px;
border:none;
background:#f1f1f1;
margin:5px;
width:120px;
text-align:center;
}

/* ПРИЗРАК */

.ghost{
font-size:70px;
margin-top:10px;
}

/* НОЧНОЙ РЕЖИМ */

.dark{

background:linear-gradient(180deg,#12081e,#2a0e3d);
color:white;

}

.dark .card{
background:rgba(255,255,255,0.08);
color:white;
}

/* КНОПКА НОЧИ */

.night{

position:fixed;
bottom:20px;
left:20px;
background:#00000060;
color:white;
padding:10px 18px;
border-radius:20px;

}

/* 3D ЦВЕТЫ */

.flower{

position:fixed;
font-size:28px;
pointer-events:none;
animation:flowerFloat linear infinite;

}

@keyframes flowerFloat{

0%{transform:translateY(110vh) rotate(0deg)}
50%{transform:translateY(40vh) rotate(180deg) scale(1.2)}
100%{transform:translateY(-10vh) rotate(360deg)}

}

/* СЕРДЦА */

.heart{

position:fixed;
font-size:24px;
pointer-events:none;
animation:heartFire 2s forwards;

}

@keyframes heartFire{

0%{transform:scale(0);opacity:1}
50%{transform:scale(1.3) translateY(-120px)}
100%{transform:scale(0.2) translateY(-400px);opacity:0}

}

</style>
</head>

<body>

<div class="pages">

<div class="page">
<h1>Мамочка ❤️</h1>
</div>

<div class="page">

<div class="card">

С 8 Марта 🌸

Спасибо за твою любовь,
заботу и тепло.

Ты самая лучшая мама
в мире ❤️

</div>

</div>

<div class="page">

<img class="photo"
src="https://i.ibb.co/6JDxwj1v/IMG-0704.jpg">

<img class="photo"
src="https://i.ibb.co/p69x2rzG/IMG-0705.jpg">

</div>

<div class="page">

<div class="card">
Мини-квест 👀  
Пройди лабиринт
</div>

<div id="maze" class="maze"></div>

<div class="controls">

<div></div>
<div class="ctrl" onclick="move(0,-1)">⬆️</div>
<div></div>

<div class="ctrl" onclick="move(-1,0)">⬅️</div>
<div class="ctrl" onclick="move(0,1)">⬇️</div>
<div class="ctrl" onclick="move(1,0)">➡️</div>

</div>

<div id="form" class="card" style="display:none">

Введите имя и возраст 👇

<br><br>

<input id="name" placeholder="Имя">
<input id="age" placeholder="Возраст">

<br><br>

<button onclick="finish()">Готово</button>

</div>

<div id="ghostCard" class="card" style="display:none">

<div class="ghost">👻</div>
<div id="ghostText"></div>

</div>

</div>

</div>

<div class="night" onclick="night()">🌙 Ночь</div>

<script>

/* ЦВЕТЫ */

for(let i=0;i<20;i++){

let f=document.createElement("div")

f.className="flower"
f.innerHTML=["🌸","🌺","🌼"][Math.floor(Math.random()*3)]

f.style.left=Math.random()*100+"vw"
f.style.animationDuration=18+Math.random()*10+"s"

document.body.appendChild(f)

}

/* СЕРДЦА НА КАСАНИЕ */

document.addEventListener("click",e=>{

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=e.clientX+"px"
h.style.top=e.clientY+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

})

/* ЛАБИРИНТ */

const map=[
"#######",
"#P    #",
"# ### #",
"#   # #",
"# ### #",
"#    E#",
"#######"
]

let px=1
let py=1

const maze=document.getElementById("maze")

function draw(){

maze.innerHTML=""

map.forEach((row,y)=>{

[...row].forEach((c,x)=>{

let d=document.createElement("div")

d.className="cell "+(
x==px&&y==py?"player":
c=="#"?"wall":
c=="E"?"exit":"path"
)

maze.appendChild(d)

})

})

}

draw()

function move(dx,dy){

let nx=px+dx
let ny=py+dy

if(map[ny][nx]=="#")return

px=nx
py=ny

draw()

if(map[ny][nx]=="E"){

document.getElementById("form").style.display="block"

}

}

/* ПЕЧАТЬ ПРИЗРАКА */

function type(text){

let i=0
ghostText.innerHTML=""

let t=setInterval(()=>{

ghostText.innerHTML+=text[i]

i++

if(i>=text.length)clearInterval(t)

},40)

}

/* ФИНИШ */

function finish(){

let name=nameInput.value
let age=ageInput.value

ghostCard.style.display="block"

let text=
"Молодец "+name+"! 🎉\n\n"+
"Тебе "+age+" лет.\n"+
"Ты прошла мой лабиринт!\n\n"+
"Я тебя не съем 👻"

type(text)

fireworks()

}

/* ФЕЙЕРВЕРК СЕРДЕЦ */

function fireworks(){

for(let i=0;i<200;i++){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.top=Math.random()*100+"vh"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

/* НОЧЬ */

function night(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
