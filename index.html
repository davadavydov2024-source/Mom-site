<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для мамы 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  overflow-x:hidden;
  overscroll-behavior-y:contain;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

/* ===== ОСНОВНОЙ ФОН ===== */
body{
  background:linear-gradient(180deg,#ff4fa3,#ff8fc7,#ffd6ea);
  transition:background .6s;
}

body.night{
  background:linear-gradient(180deg,#1b1026,#2a1638,#3b1f4f);
}

/* ===== СКРОЛЛ ===== */
.pages{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.page{
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 24px;
  position:relative;
}

/* ===== ТЕКСТ ===== */
h1{
  color:#fff;
  font-size:34px;
  margin-bottom:20px;
  text-shadow:0 6px 20px rgba(0,0,0,.25);
}

p{
  color:#fff;
  font-size:18px;
  line-height:1.5;
  max-width:320px;
}

/* ===== АВАТАР 8 ===== */
.avatar8{
  width:130px;
  height:130px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:70px;
  font-weight:800;
  color:#ff4f9a;
  background:
    radial-gradient(circle at top left,#fff,#ffd6ea 40%,#ff9fc9);
  box-shadow:
    0 20px 40px rgba(255,79,154,.35),
    inset 0 0 20px rgba(255,255,255,.6);
  animation:pulse 3s infinite;
  margin-bottom:30px;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}

/* ===== КНОПКИ ===== */
button{
  margin-top:26px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  font-size:16px;
  background:#fff;
  color:#ff4f9a;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
}

/* ===== СЕРДЕЧКИ ФОН ===== */
.heart{
  position:absolute;
  font-size:18px;
  opacity:.25;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-120vh)}
}

/* ===== НОЧНОЙ РЕЖИМ ===== */
.night-toggle{
  position:fixed;
  right:16px;
  bottom:16px;
  background:rgba(0,0,0,.4);
  color:#fff;
  padding:10px 14px;
  border-radius:20px;
  font-size:14px;
  z-index:10;
}

/* ===== СЕКРЕТКА ===== */
.hidden{display:none}

/* ===== ЛАБИРИНТ ===== */
.maze{
  width:260px;
  height:260px;
  background:#fff;
  border-radius:22px;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  overflow:hidden;
}

.wall{
  position:absolute;
  background:#ff9fc9;
}

.player{
  width:20px;
  height:20px;
  background:#ff4f9a;
  border-radius:50%;
  position:absolute;
  top:10px;
  left:10px;
}

.goal{
  width:24px;
  height:24px;
  background:#6bffb8;
  border-radius:50%;
  position:absolute;
  right:10px;
  bottom:10px;
}

/* ===== ПРИЗРАК ===== */
#ghost{
  font-size:60px;
  animation:float 3s ease-in-out infinite;
}
</style>
</head>

<body>

<div class="pages">

<!-- ЭКРАН 1 -->
<section class="page">
  <div class="avatar8">8</div>
  <h1>Это от Артёма и Андрея 💖</h1>
  <p>Листай вниз ✨</p>
</section>

<!-- ЭКРАН 2 -->
<section class="page">
  <p>
    Мамочка 💕  
    Ты — самое тёплое и доброе,  
    что есть в нашей жизни.  
    Мы сделали этот сайт  
    только для тебя ✨
  </p>
</section>

<!-- ЭКРАН 3 -->
<section class="page">
  <h1>Секретный экран 🌸</h1>
  <p>Если хочешь — попробуй наш мини-квест</p>
  <button onclick="startQuest()">Мини-квест</button>
</section>

<!-- ЛАБИРИНТ -->
<section class="page hidden" id="mazeScreen">
  <h1>Найди выход 👌</h1>
  <div class="maze" id="maze">
    <div class="player" id="player"></div>
    <div class="goal"></div>

    <div class="wall" style="top:60px;left:0;width:200px;height:14px"></div>
    <div class="wall" style="top:120px;left:60px;width:200px;height:14px"></div>
    <div class="wall" style="top:180px;left:0;width:200px;height:14px"></div>
  </div>
</section>

<!-- ФОРМА -->
<section class="page hidden" id="formScreen">
  <h1>Ты справилась 💖</h1>
  <input id="name" placeholder="Твоё имя"><br><br>
  <input id="age" placeholder="Сколько тебе лет?"><br>
  <button onclick="finish()">Готово</button>
</section>

<!-- ФИНАЛ -->
<section class="page hidden" id="finalScreen">
  <div id="ghost">👻</div>
  <p id="ghostText"></p>
</section>

</div>

<div class="night-toggle" onclick="toggleNight()">🌙 Ночь</div>

<script>
/* НОЧЬ */
function toggleNight(){
  document.body.classList.toggle("night");
}

/* СЕРДЦА */
for(let i=0;i<18;i++){
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="♡";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=8+Math.random()*6+"s";
  document.body.appendChild(h);
}

/* СЕКРЕТКА */
function startQuest(){
  document.getElementById("mazeScreen").classList.remove("hidden");
  document.querySelector(".pages").scrollTo({top:innerHeight*3,behavior:"smooth"});
}

/* ЛАБИРИНТ */
let x=10,y=10;
const player=document.getElementById("player");

document.addEventListener("touchmove",e=>{
  e.preventDefault();
  const t=e.touches[0];
  x+=t.movementX||0;
  y+=t.movementY||0;
  x=Math.max(0,Math.min(236,x));
  y=Math.max(0,Math.min(236,y));
  player.style.left=x+"px";
  player.style.top=y+"px";

  if(x>210 && y>210){
    document.getElementById("formScreen").classList.remove("hidden");
    document.getElementById("mazeScreen").classList.add("hidden");
  }
},{passive:false});

/* ФИНАЛ */
function finish(){
  const n=document.getElementById("name").value||"героиня";
  document.getElementById("ghostText").innerText=
   `Молодец, ${n}! 💖  
   Ты прошла мою игру.  
   Я тебя не съем :( `;
  document.getElementById("finalScreen").classList.remove("hidden");
  document.getElementById("formScreen").classList.add("hidden");
}
</script>

</body>
</html>
