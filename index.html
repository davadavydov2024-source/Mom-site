<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для мамы 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

/* ===== СКРОЛЛ (КЛЮЧ!) ===== */
.pages{
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
}

.page{
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:32px 20px;
}

/* ===== ФОН ===== */
body{
  background:linear-gradient(180deg,#ff4fa3,#ff8fc7,#ffd6ea);
}

/* ===== ТЕКСТ ===== */
h1{
  color:#fff;
  font-size:34px;
  margin-bottom:16px;
}

p{
  color:#fff;
  font-size:18px;
  line-height:1.6;
  max-width:340px;
}

/* ===== АВАТАР 8 ===== */
.avatar8{
  width:140px;
  height:140px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:72px;
  font-weight:900;
  color:#ff4f9a;
  background:radial-gradient(circle,#fff,#ffd6ea 40%,#ff9fc9);
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  margin-bottom:24px;
}

/* ===== СЕРДЕЧКИ ===== */
.heart{
  position:fixed;
  font-size:18px;
  opacity:.25;
  animation:float 9s linear infinite;
  pointer-events:none;
}
@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-120vh)}
}

/* ===== КНОПКИ ===== */
button{
  margin-top:20px;
  padding:14px 28px;
  border:none;
  border-radius:999px;
  font-size:16px;
  background:#fff;
  color:#ff4f9a;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
}

/* ===== СКРЫТО ===== */
.hidden{display:none}

/* ===== ЛАБИРИНТ ===== */
.maze{
  width:280px;
  height:280px;
  background:#fff;
  border-radius:22px;
  position:relative;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.wall{
  position:absolute;
  background:#ff9fc9;
  border-radius:6px;
}

.player{
  width:20px;
  height:20px;
  background:#ff4fa3;
  border-radius:50%;
  position:absolute;
  top:10px;
  left:10px;
}

.goal{
  width:24px;
  height:24px;
  background:#6bffb8;
  border-radius:50%;
  position:absolute;
  right:10px;
  bottom:10px;
}

/* ===== КНОПКИ УПРАВЛЕНИЯ ===== */
.controls{
  display:flex;
  gap:10px;
  margin-top:20px;
}
.controls button{
  width:56px;
  height:56px;
  font-size:22px;
}
</style>
</head>

<body>

<div class="pages">

<!-- ЭКРАН 1 -->
<section class="page">
  <div class="avatar8">8</div>
  <h1>Для мамы 💖</h1>
  <p>Листай вниз ✨</p>
</section>

<!-- ЭКРАН 2 -->
<section class="page">
  <p>
    Мамочка 💕  
    Этот сайт мы сделали  
    с любовью и нежностью.  
    Пусть он подарит  
    тебе улыбку ✨
  </p>
</section>

<!-- ЭКРАН 3 -->
<section class="page">
  <h1>Секрет 🌸</h1>
  <p>Хочешь пройти мини-квест?</p>
  <button onclick="startQuest()">Начать</button>
</section>

<!-- ЛАБИРИНТ -->
<section class="page hidden" id="mazeScreen">
  <h1>Лабиринт 👌</h1>

  <div class="maze">
    <div class="player" id="player"></div>
    <div class="goal"></div>

    <div class="wall" style="top:60px;left:0;width:220px;height:14px"></div>
    <div class="wall" style="top:120px;left:60px;width:220px;height:14px"></div>
    <div class="wall" style="top:180px;left:0;width:220px;height:14px"></div>
    <div class="wall" style="left:100px;top:0;width:14px;height:200px"></div>
  </div>

  <div class="controls">
    <button onclick="move(0,-10)">⬆️</button>
  </div>
  <div class="controls">
    <button onclick="move(-10,0)">⬅️</button>
    <button onclick="move(10,0)">➡️</button>
  </div>
  <div class="controls">
    <button onclick="move(0,10)">⬇️</button>
  </div>
</section>

<!-- ФОРМА -->
<section class="page hidden" id="formScreen">
  <h1>Ты справилась 💖</h1>
  <input id="name" placeholder="Твоё имя"><br><br>
  <input id="age" placeholder="Сколько тебе лет?"><br>
  <button onclick="finish()">Готово</button>
</section>

<!-- ФИНАЛ -->
<section class="page hidden" id="finalScreen">
  <div style="font-size:64px">👻</div>
  <p id="ghostText"></p>
</section>

</div>

<script>
/* СЕРДЦА */
for(let i=0;i<20;i++){
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="♡";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=8+Math.random()*6+"s";
  document.body.appendChild(h);
}

/* СЕКРЕТКА */
function startQuest(){
  document.getElementById("mazeScreen").classList.remove("hidden");
  document.querySelector(".pages").scrollTo({top:innerHeight*3,behavior:"smooth"});
}

/* ЛАБИРИНТ */
let x=10,y=10;
const player=document.getElementById("player");

function move(dx,dy){
  x=Math.max(0,Math.min(260,x+dx));
  y=Math.max(0,Math.min(260,y+dy));
  player.style.left=x+"px";
  player.style.top=y+"px";

  if(x>240 && y>240){
    document.getElementById("mazeScreen").classList.add("hidden");
    document.getElementById("formScreen").classList.remove("hidden");
  }
}

/* ФИНАЛ */
function finish(){
  const n=document.getElementById("name").value||"героиня";
  document.getElementById("ghostText").innerText=
   `Молодец, ${n}! 💖  
   Ты прошла лабиринт.  
   Я тебя не съем ;) `;
  document.getElementById("formScreen").classList.add("hidden");
  document.getElementById("finalScreen").classList.remove("hidden");
}
</script>

</body>
</html>
