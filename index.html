<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для мамы 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  background:linear-gradient(180deg,#ff4fa0,#ff86c8,#ffe1f0);
  color:#3b0f25;
  overflow:hidden;
}

/* ===== СТАРТ ===== */
.start{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#ff9ad5,#ff4fa0);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:1000;
  color:white;
}

.start h1{font-size:44px;font-weight:700}
.start p{margin-top:14px;font-size:20px;opacity:.9}
.tap{margin-top:40px;font-size:16px;opacity:.7;animation:pulse 2s infinite}

@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ===== СТРАНИЦЫ ===== */
.pages{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.page{
  height:100vh;
  scroll-snap-align:start;
  padding:40px 26px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

/* ===== ФОН С СЕРДЦАМИ ===== */
.bg::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle,rgba(255,255,255,.35) 2px,transparent 2px),
    radial-gradient(circle,rgba(255,255,255,.2) 1.5px,transparent 1.5px);
  background-size:60px 60px,100px 100px;
  opacity:.45;
}

/* ===== ТЕКСТ ===== */
h2{
  font-size:34px;
  color:#fff;
  text-shadow:0 8px 30px rgba(0,0,0,.25);
}

.text{
  margin-top:20px;
  max-width:420px;
  background:rgba(255,255,255,.92);
  padding:26px;
  border-radius:30px;
  font-size:18px;
  line-height:1.7;
  box-shadow:0 25px 60px rgba(0,0,0,.18);
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.show .text{opacity:1;transform:none}

/* ===== ФОТО ===== */
.photo img{
  width:90%;
  max-width:340px;
  border-radius:32px;
  box-shadow:0 30px 70px rgba(0,0,0,.35);
}

.caption{margin-top:14px;font-size:16px;color:#fff}

/* ===== ЦВЕТЫ ===== */
.flowers{
  position:absolute;
  top:0;bottom:0;
  width:60px;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  opacity:.4;
  font-size:28px;
}
.left{left:6px}
.right{right:6px}

/* ===== СЕРДЦА ===== */
.heart{
  position:fixed;
  font-size:26px;
  pointer-events:none;
  animation:float 7s linear forwards;
}
.outline{
  color:transparent;
  -webkit-text-stroke:2px rgba(255,255,255,.9);
}

@keyframes float{
  from{transform:translateY(100vh) scale(1);opacity:1}
  to{transform:translateY(-20vh) scale(1.6);opacity:0}
}

/* ===== СЕКРЕТ ===== */
.secret{
  background:radial-gradient(circle at top,#ffd6ea,#ff6fb7);
}
.secret p{margin-top:20px;font-size:18px;color:white}

/* ===== СКРЫТ ===== */
.hidden{display:none}
</style>
</head>

<body>

<!-- МУЗЫКА -->
<audio id="music" loop>
  <source src="24b0d8ed4ae4cb2.mp3" type="audio/mpeg">
</audio>

<!-- СТАРТ -->
<div class="start" id="start">
  <h1>Мамочка 💖</h1>
  <p>Это от Артёма и Андрея ✨</p>
  <div class="tap">Нажми на экран</div>
</div>

  <section class="page bg">
    <h2>С 8 Марта 🌸</h2>
  </section>

  <section class="page bg observe">

    <div class="flowers right">🌸🌷🌸🌷</div>
    <div class="text">
      Ты самая добрая, нежная  
      и любимая мама на свете 💗  
      Нам очень повезло с тобой.
    </div>
  </section>

  <section class="page photo bg">
    <img src="https://i.ibb.co/6JDxwj1v/IMG-0704.jpg">
    <div class="caption">Ты у нас самая красивая 💐</div>
  </section>

  <section class="page bg observe">

    </div>
  </section>

  <section class="page photo bg">
    <img src="https://i.ibb.co/p69x2rzG/IMG-0705.jpg">
    <div class="caption">Навсегда в нашем сердце 💖</div>
