<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Для мамы 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:linear-gradient(180deg,#ff5fa2,#ff9acb,#ffdff1);
overflow-x:hidden;
transition:0.5s;
}

.dark{
background:linear-gradient(180deg,#1a0d2a,#2c1244);
color:white;
}

.pages{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.page{
height:100vh;
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
text-align:center;
}

h1{
font-size:40px;
color:white;
text-shadow:0 10px 20px rgba(0,0,0,0.3);
animation:fade 1s;
}

.box{
background:white;
padding:25px;
border-radius:25px;
max-width:420px;
font-size:18px;
line-height:1.6;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
animation:fade 1s;
}

.dark .box{
background:#ffffff15;
backdrop-filter:blur(10px);
color:white;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

/* КНОПКИ */

.btn{
margin-top:20px;
padding:12px 20px;
border-radius:20px;
background:white;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* НОЧЬ */

.night{
position:fixed;
bottom:20px;
left:20px;
background:#00000050;
color:white;
padding:10px 16px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* ЛАБИРИНТ */

.maze{
display:grid;
grid-template-columns:repeat(8,40px);
gap:6px;
margin-top:20px;
}

.cell{
width:40px;
height:40px;
border-radius:10px;
}

.wall{background:#f4a9c6}
.path{background:white}
.player{background:#ff4f9a}
.exit{background:#6bffb0}

/* УПРАВЛЕНИЕ */

.controls{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,70px);
gap:12px;
}

.ctrl{
background:white;
padding:14px;
border-radius:20px;
font-size:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* СЕРДЕЧКИ */

.heart{
position:fixed;
font-size:20px;
animation:boom 2s linear forwards;
}

@keyframes boom{
0%{transform:scale(0) translateY(0)}
50%{transform:scale(1.5)}
100%{transform:translateY(-600px) scale(0)}
}

</style>
</head>

<body>

<div class="pages">

<div class="page">
<h1>Мамочка 💖</h1>
</div>

<div class="page">
<div class="box">
Спасибо тебе за всё ❤️  
Ты самый добрый и заботливый человек.  
Пусть у тебя всегда будет счастье,
улыбка и радость 🌸
</div>
</div>

<div class="page">
<div class="box">
Мы тебя очень любим 💗  
Этот маленький сайт сделан
специально для тебя ✨
</div>
</div>

<div class="page">

<div class="box">
Мини-квест 👀  
Пройди лабиринт
</div>

<div class="maze" id="maze"></div>

<div class="controls">

<div></div>
<div class="ctrl" onclick="move(0,-1)">⬆️</div>
<div></div>

<div class="ctrl" onclick="move(-1,0)">⬅️</div>
<div class="ctrl" onclick="move(0,1)">⬇️</div>
<div class="ctrl" onclick="move(1,0)">➡️</div>

</div>

<div id="win" style="display:none;margin-top:20px;" class="box">
🎉 Ты прошла лабиринт!  
Я тебя очень люблю 💖
</div>

</div>

</div>

<div class="night" onclick="night()">🌙 Ночь</div>

<script>

/* ЛАБИРИНТ (ЛЁГКИЙ) */

const map=[
"########",
"#P     #",
"# ###  #",
"#   #  #",
"#   ## #",
"#      #",
"#   ###E",
"########"
]

let px=1
let py=1

const maze=document.getElementById("maze")

function draw(){

maze.innerHTML=""

map.forEach((row,y)=>{
[...row].forEach((c,x)=>{

const d=document.createElement("div")

d.className="cell "+(
x===px && y===py ? "player" :
c=="#" ? "wall" :
c=="E" ? "exit" :
"path"
)

maze.appendChild(d)

})
})

}

draw()

function move(dx,dy){

const nx=px+dx
const ny=py+dy

if(map[ny][nx]=="#")return

px=nx
py=ny

draw()

if(map[ny][nx]=="E"){
win.style.display="block"
hearts()
}

}

/* ВЗРЫВ СЕРДЕЧЕК */

function hearts(){

for(let i=0;i<40;i++){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.top=Math.random()*100+"vh"

document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

/* НОЧНОЙ РЕЖИМ */

function night(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
