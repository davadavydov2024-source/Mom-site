<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для мамы 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;scroll-behavior:smooth}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  background:linear-gradient(180deg,#ff4fa0,#ff7bc8,#ffe1f0);
  color:#3b0f25;
  overflow:hidden;
  transition:background 1s,color 1s;
}

/* ночной режим */
body.night{
  background:linear-gradient(180deg,#1a0f1f,#2a1430,#3b1845);
  color:#ffe6f2;
}

/* старт */
.start{
  position:fixed;inset:0;
  background:radial-gradient(circle at top,#ffb3dc,#ff4fa0);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;z-index:1000;color:white;
}
.start h1{font-size:46px;font-weight:800}
.start p{margin-top:16px;font-size:20px}
.tap{margin-top:44px;opacity:.7;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* страницы */
.pages{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.page{
  height:100vh;
  scroll-snap-align:start;
  padding:44px 26px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

/* фон пузырьки */
.page::before{
  content:"";
  position:absolute;inset:-10%;
  background:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.25),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(255,255,255,.2),transparent 40%);
  filter:blur(40px);
}

/* цветы разные */
.flowers{
  position:absolute;top:0;bottom:0;
  width:70px;display:flex;
  flex-direction:column;
  justify-content:space-around;
  opacity:.35;font-size:30px;
  pointer-events:none;
}
.left{left:6px}
.right{right:6px}

/* текст */
h2{font-size:36px;color:#fff;text-shadow:0 12px 40px rgba(0,0,0,.3)}
.text{
  margin-top:22px;
  max-width:420px;
  background:rgba(255,255,255,.94);
  padding:28px;border-radius:32px;
  font-size:18px;line-height:1.7;
  box-shadow:0 30px 80px rgba(0,0,0,.2);
  opacity:0;transform:translateY(40px);
  transition:1.2s cubic-bezier(.2,.8,.2,1);
}
.show .text{opacity:1;transform:none}

/* фото */
.photo img{
  width:90%;max-width:340px;
  border-radius:34px;
  box-shadow:
    0 0 0 6px rgba(255,255,255,.35),
    0 35px 80px rgba(0,0,0,.35);
}
.caption{margin-top:16px;font-size:16px;color:#fff}

/* сердца */
.heart{
  position:fixed;font-size:26px;
  pointer-events:none;
  animation:float 8s linear forwards;
}
.outline{
  color:transparent;
  -webkit-text-stroke:2px rgba(255,255,255,.95);
}
@keyframes float{
  from{transform:translateY(100vh) scale(1);opacity:1}
  to{transform:translateY(-25vh) scale(1.7);opacity:0}
}

/* финал */
.final{
  background:radial-gradient(circle at top,#ffd6ea,#ff6fb7);
}
.night .final{
  background:radial-gradient(circle at top,#3b1845,#1a0f1f);
}

/* кнопка ночи */
.toggle{
  position:fixed;bottom:16px;right:16px;
  background:rgba(255,255,255,.85);
  border-radius:20px;
  padding:10px 14px;
  font-size:14px;
  z-index:900;
}
.night .toggle{background:rgba(0,0,0,.6);color:white}

/* пасхалка */
.easter{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:flex;justify-content:center;align-items:center;
  color:white;font-size:36px;
  z-index:1200;
  animation:pop 1.2s ease forwards;
}
@keyframes pop{
  from{opacity:0;transform:scale(.6)}
  to{opacity:1;transform:scale(1)}
}
.hidden{display:none}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="24b0d8ed4ae4cb2.mp3">
</audio>

<div class="start" id="start">
  <h1>Мамочка 💖</h1>
  <p>Это от Артёма и Андрея</p>
  <div class="tap">Нажми на экран</div>
</div>

<div class="toggle" id="nightBtn">🌙 Ночь</div>

<div class="pages">

  <section class="page">
    <h2>С 8 Марта 🌸</h2>
  </section>

  <section class="page observe">
    <div class="flowers left">🌷🌸🌷🌸</div>
    <div class="flowers right">🌸🌷🌸🌷</div>
    <div class="text">Ты самая добрая и любимая мама 💗</div>
  </section>

  <section class="page photo">
    <div class="flowers left">🌹🌹🌹</div>
    <div class="flowers right">🌹🌹🌹</div>
    <img src="https://i.ibb.co/6JDxwj1v/IMG-0704.jpg">
    <div class="caption">Ты у нас самая красивая</div>
  </section>

  <section class="page observe">
    <div class="flowers left">🌼🌼🌼</div>
    <div class="flowers right">🌼🌼🌼</div>
    <div class="text">Спасибо за заботу и тепло ❤️</div>
  </section>

  <section class="page photo">
    <div class="flowers left">🌺🌺🌺</div>
    <div class="flowers right">🌺🌺🌺</div>
    <img src="https://i.ibb.co/p69x2rzG/IMG-0705.jpg">
    <div class="caption">Мы тебя очень любим</div>
  </section>

  <section class="page final" id="final">
    <h2>Спасибо, что ты у нас есть 💖</h2>
  </section>

</div>

<div class="easter hidden" id="easter">ЛЮБИМ · ЦЕНИМ 💖</div>

<script>
/* старт + музыка */
document.addEventListener("click",()=>{
  document.getElementById("start").style.display="none";
  const m=document.getElementById("music");
  m.volume=0;m.play();
  let v=0;
  const f=setInterval(()=>{
    v+=0.02;m.volume=Math.min(v,.8);
    if(v>=.8)clearInterval(f);
  },100);
},{once:true});

/* сердца */
function heart(x=null,y=null){
  const h=document.createElement("div");
  h.className="heart";
  h.textContent=Math.random()>.5?"💗":"🤍";
  if(h.textContent==="🤍")h.classList.add("outline");
  h.style.left=(x??Math.random()*100)+"vw";
  h.style.top=(y??100)+"vh";
  h.style.fontSize=22+Math.random()*26+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),8000);
}
setInterval(heart,700);

/* взрыв на финале */
const final=document.getElementById("final");
const obsFinal=new IntersectionObserver(e=>{
  if(e[0].isIntersecting){
    for(let i=0;i<40;i++){
      setTimeout(()=>heart(Math.random()*innerWidth,innerHeight),i*40);
    }
  }
},{threshold:.7});
obsFinal.observe(final);

/* появление текста */
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>e.isIntersecting&&e.target.classList.add("show"));
},{threshold:.4});
document.querySelectorAll(".observe").forEach(e=>obs.observe(e));

/* ночной режим */
document.getElementById("nightBtn").onclick=()=>{
  document.body.classList.toggle("night");
};

/* пасхалка 15 кликов */
let clicks=0;
document.addEventListener("click",()=>{
  clicks++;
  if(clicks===15){
    document.getElementById("easter").classList.remove("hidden");
    setTimeout(()=>{
      document.getElementById("easter").classList.add("hidden");
    },3000);
  }
});
</script>

</body>
</html>
